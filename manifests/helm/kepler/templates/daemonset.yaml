apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{include "kepler.fullname" .}}
  namespace: {{include "kepler.namespace" .}}
  labels:
    {{- include "kepler.labels" . | nindent 4}}
  {{- with .Values.annotations}}
  annotations:
    {{- toYaml . | nindent 4}}
  {{- end}}
spec:
  selector:
    matchLabels:
      {{- include "kepler.selectorLabels" . | nindent 6}}
  template:
    metadata:
      labels:
        {{- include "kepler.selectorLabels" . | nindent 8 }}
        {{- with .Values.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.annotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "kepler.serviceAccountName" . }}
      hostPID: {{ .Values.daemonset.hostPID }}
      hostUsers: {{ .Values.daemonset.hostUsers }}
      {{- with .Values.daemonset.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.daemonset.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.daemonset.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.config.experimental.gpu.enabled }}
      initContainers:
        - name: nvidia-libs
          image: "{{ .Values.daemonset.nvidia.nvmlInitImage.repository }}:{{ .Values.daemonset.nvidia.nvmlInitImage.tag }}"
          imagePullPolicy: IfNotPresent
          securityContext:
            # Root required to read root-owned driver libs; capabilities dropped.
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          command:
            - sh
            - -c
            - |
              set -e
              # cp -P keeps driver symlink chains (avoids 200Mi emptyDir blowup).
              # set -e: copy failures fail init; do not mask with || true.
              found=$(find /run-nvidia -name "libnvidia-ml.so*" 2>/dev/null | wc -l)
              if [ "$found" -gt 0 ]; then
                find /run-nvidia -name "libnvidia-ml.so*" -exec cp -P {} /nvml-libs/ \;
                copied=$(ls /nvml-libs/ 2>/dev/null | wc -l)
                echo "Copied $copied of $found NVML library file(s) to /nvml-libs"
              else
                echo "No NVML libraries found at /run-nvidia — GPU metrics will be unavailable on this node"
              fi
          volumeMounts:
            - name: lib-nvidia
              mountPath: /run-nvidia
              readOnly: true
            - name: nvml-libs
              mountPath: /nvml-libs
      {{- end }}
      containers:
        - name: kepler
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.daemonset.securityContext | nindent 12 }}
          command:
            - /usr/bin/kepler
          args:
            - --config.file=/etc/kepler/config.yaml
            - --kube.enable
            - --kube.node-name=$(NODE_NAME)
          ports:
            - name: http
              containerPort: 28282
              protocol: TCP
          volumeMounts:
            - name: sysfs
              mountPath: /host/sys
              readOnly: true
            - name: procfs
              mountPath: /host/proc
              readOnly: true
            - name: cfm
              mountPath: /etc/kepler
            {{- if .Values.config.experimental.gpu.enabled }}
            - name: nvml-libs
              mountPath: /usr/local/nvidia/lib64
              readOnly: true
            {{- end }}
          {{- with .Values.daemonset.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.daemonset.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.daemonset.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            # Always set (independent of gpu.enabled) for runtimeClassName: nvidia.
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_MIG_MONITOR_DEVICES
              value: "all"
            {{- if .Values.config.experimental.gpu.enabled }}
            # Path for libnvidia-ml.so from the nvidia-libs init container.
            - name: LD_LIBRARY_PATH
              value: /usr/local/nvidia/lib64
            {{- end }}
          {{- with .Values.daemonset.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: sysfs
          hostPath:
            path: /sys
        - name: procfs
          hostPath:
            path: /proc
        - name: cfm
          configMap:
            name: {{ include "kepler.fullname" . }}
        {{- if .Values.config.experimental.gpu.enabled }}
        - name: lib-nvidia
          hostPath:
            path: {{ .Values.daemonset.nvidia.driverPath | quote }}
            # DirectoryOrCreate so non-GPU nodes still schedule.
            type: DirectoryOrCreate
        - name: nvml-libs
          emptyDir:
            sizeLimit: 200Mi
        {{- end }}
