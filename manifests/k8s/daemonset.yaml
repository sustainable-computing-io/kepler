apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kepler
  namespace: kepler
  labels:
    app.kubernetes.io/name: kepler
    app.kubernetes.io/part-of: kepler
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kepler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kepler
        app.kubernetes.io/part-of: kepler
    spec:
      serviceAccountName: kepler
      hostPID: true
      hostUsers: true
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: nvidia-libs
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          securityContext:
            # Root required to read root-owned driver libs; capabilities dropped.
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          command:
            - sh
            - -c
            - |
              set -e
              # cp -P keeps driver symlink chains (avoids 200Mi emptyDir blowup).
              # set -e: copy failures fail init; do not mask with || true.
              found=$(find /run-nvidia -name "libnvidia-ml.so*" 2>/dev/null | wc -l)
              if [ "$found" -gt 0 ]; then
                find /run-nvidia -name "libnvidia-ml.so*" -exec cp -P {} /nvml-libs/ \;
                copied=$(ls /nvml-libs/ 2>/dev/null | wc -l)
                echo "Copied $copied of $found NVML library file(s) to /nvml-libs"
              else
                echo "No NVML libraries found at /run-nvidia — GPU metrics will be unavailable on this node"
              fi
          volumeMounts:
            - name: lib-nvidia
              mountPath: /run-nvidia
              readOnly: true
            - name: nvml-libs
              mountPath: /nvml-libs
      containers:
        - name: kepler
          image: <KEPLER_IMAGE>
          imagePullPolicy: Always
          securityContext:
            privileged: true
            runAsNonRoot: false
          command:
            - /usr/bin/kepler
          args:
            - --config.file=/etc/kepler/config.yaml
            - --kube.enable
            - --kube.node-name=$(NODE_NAME)
          ports:
            - name: http
              containerPort: 28282
              protocol: TCP
          volumeMounts:
            - name: sysfs
              mountPath: /host/sys
              readOnly: true
            - name: procfs
              mountPath: /host/proc
              readOnly: true
            - name: cfm
              mountPath: /etc/kepler/config.yaml
              subPath: config.yaml
              readOnly: true
            # NVML libs only (copied by init); avoids mounting driver glibc.
            - name: nvml-libs
              mountPath: /usr/local/nvidia/lib64
              readOnly: true
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 10
            periodSeconds: 60
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            # Static path; K8s cannot expand the image's existing LD_LIBRARY_PATH.
            - name: LD_LIBRARY_PATH
              value: /usr/local/nvidia/lib64
            # Required for NVML to see all MIG devices when running in a container
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_MIG_MONITOR_DEVICES
              value: all
      volumes:
        - name: sysfs
          hostPath:
            path: /sys
        - name: procfs
          hostPath:
            path: /proc
        - name: cfm
          configMap:
            name: kepler
        # lib-nvidia: host driver path; nvml-libs: init-populated emptyDir.
        - name: lib-nvidia
          hostPath:
            path: /run/nvidia/driver
            type: DirectoryOrCreate
        - name: nvml-libs
          emptyDir:
            sizeLimit: 200Mi
